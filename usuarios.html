<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Usuários</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container lista-container">
      <h1 class="h1">Usuários Cadastrados</h1>

      <button id="btnListar" class="button">Mostrar Usuários</button>

      <table class="tabela">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Número</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
      <a href="cadastro.html">Voltar</a>
    </div>

    <script type="module" src="usuarios.js"></script>
  </body>
</html>
